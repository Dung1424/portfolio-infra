version: "3.8"

services:
  minio:
    image: minio/minio
    container_name: portfolio_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    networks:
      - portfolio_net

  # Tạo bucket mặc định (Laravel AWS_BUCKET=portfolio, Node chat/). Client S3 trong container phải gọi http://minio:9000 — không dùng hostname có "_".
  minio-init:
    image: minio/mc
    container_name: portfolio_minio_init
    depends_on:
      - minio
    networks:
      - portfolio_net
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set dock http://minio:9000 admin password123;
      mc mb --ignore-existing dock/portfolio;
      mc mb --ignore-existing dock/chat;
      exit 0;
      "
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - portfolio_net

volumes:
  minio_data:

networks:
  portfolio_net:
    external: true 